<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>外出待办管理</title>
<meta name="theme-color" content="#4f46e5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="出行清单" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icon-180.png" />
<style>
  :root{
    --bg:#f1f5f9; --card:#ffffff; --ink:#0f172a; --muted:#64748b;
    --line:#e2e8f0; --brand:#4f46e5; --brand2:#6366f1; --brand-ink:#312e81;
    --ok:#16a34a; --okbg:#dcfce7; --danger:#dc2626; --warnbg:#fef2f2;
    --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.45;
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
  }
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
  input{font-family:inherit; font-size:16px} /* 16px stops iOS zoom-on-focus */

  /* App header */
  .topbar{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(160deg,var(--brand),var(--brand2));
    color:#fff; padding:calc(var(--safe-t) + 14px) 16px 14px;
    box-shadow:0 2px 10px rgba(79,70,229,.25);
  }
  .topbar-row{display:flex; align-items:center; gap:10px; min-height:32px}
  .topbar h1{font-size:18px; margin:0; font-weight:650; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .topbar .sub{font-size:12.5px; opacity:.85; margin-top:3px}
  .icon-btn{
    width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-size:19px; background:rgba(255,255,255,.16); color:#fff; flex:none;
  }
  .icon-btn:active{background:rgba(255,255,255,.3)}

  .wrap{max-width:680px; margin:0 auto; padding:14px 14px calc(var(--safe-b) + 90px)}

  /* Progress bar */
  .pbar{height:7px; background:rgba(255,255,255,.25); border-radius:99px; margin-top:11px; overflow:hidden}
  .pbar > i{display:block; height:100%; background:#fff; border-radius:99px; transition:width .25s ease}

  /* Cards */
  .card{background:var(--card); border-radius:16px; box-shadow:var(--shadow); margin-bottom:12px; overflow:hidden}
  .trip{display:flex; align-items:center; gap:12px; padding:14px 15px}
  .trip:active{background:#f8fafc}
  .trip .emoji{font-size:26px; flex:none; width:44px; height:44px; border-radius:12px; background:#eef2ff; display:flex; align-items:center; justify-content:center}
  .trip .meta{flex:1; min-width:0}
  .trip .name{font-weight:620; font-size:16px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .trip .info{font-size:12.5px; color:var(--muted); margin-top:2px}
  .trip .ring{flex:none; font-size:12px; color:var(--muted); text-align:right}
  .mini{height:5px; background:var(--line); border-radius:99px; margin-top:7px; overflow:hidden}
  .mini > i{display:block; height:100%; background:var(--ok); border-radius:99px}

  .empty{text-align:center; color:var(--muted); padding:60px 24px}
  .empty .big{font-size:46px; margin-bottom:10px}

  /* Section (detail) */
  .sec-title{display:flex; align-items:center; gap:8px; margin:18px 4px 9px; font-weight:680; font-size:15px; color:var(--brand-ink)}
  .sec-title .tag{font-size:11px; font-weight:600; color:var(--muted); background:#eef2ff; padding:2px 8px; border-radius:99px}

  .cat{padding:6px 6px 4px}
  .cat + .cat{border-top:1px solid var(--line)}
  .cat-head{display:flex; align-items:center; gap:8px; padding:8px 9px 6px}
  .cat-head .cname{font-weight:620; font-size:14px; flex:1}
  .cat-head .ccount{font-size:12px; color:var(--muted)}
  .cat-head input.cname{border:1px dashed var(--line); border-radius:8px; padding:5px 8px; width:100%}

  .row{display:flex; align-items:center; gap:11px; padding:9px 10px; border-radius:10px}
  .row:active{background:#f8fafc}
  .check{
    width:23px; height:23px; border-radius:7px; border:2px solid #cbd5e1; flex:none;
    display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff; transition:.12s;
  }
  .row.done .check{background:var(--ok); border-color:var(--ok)}
  .row .txt{flex:1; font-size:15px; word-break:break-word}
  .row.done .txt{color:#94a3b8; text-decoration:line-through}
  .row input.etxt{flex:1; border:1px solid var(--line); border-radius:8px; padding:7px 9px}
  .del{width:30px; height:30px; flex:none; border-radius:8px; color:var(--danger); background:var(--warnbg); font-size:17px; display:flex; align-items:center; justify-content:center}

  /* Drag handle + drag visuals */
  .drag{width:28px; height:36px; flex:none; display:flex; align-items:center; justify-content:center;
    color:#94a3b8; font-size:18px; cursor:grab; touch-action:none; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none}
  .drag:active{cursor:grabbing; color:var(--brand)}
  .row.ph{display:none}
  .dragclone{position:fixed; left:0; top:0; z-index:80; pointer-events:none; background:var(--card);
    box-shadow:0 12px 26px rgba(15,23,42,.24); border:1px solid var(--line); border-radius:11px;
    padding:9px 10px; display:flex; align-items:center; gap:11px; opacity:.98}
  .dropgap{box-sizing:border-box; border:2px dashed var(--brand); background:rgba(79,70,229,.07);
    border-radius:10px; margin:1px 6px; pointer-events:none}

  .additem{display:flex; gap:8px; padding:6px 10px 10px}
  .additem input{flex:1; border:1px solid var(--line); border-radius:9px; padding:8px 10px; background:#fcfdff}
  .additem button{padding:0 14px; border-radius:9px; background:#eef2ff; color:var(--brand); font-weight:650; font-size:14px}
  .additem button:active{background:#e0e7ff}

  .addcat{margin:2px 4px 4px; }
  .addcat .additem button{background:var(--brand); color:#fff}

  /* Floating + button */
  .fab{
    position:fixed; right:18px; bottom:calc(var(--safe-b) + 18px); z-index:30;
    width:58px; height:58px; border-radius:50%; background:linear-gradient(160deg,var(--brand),var(--brand2));
    color:#fff; font-size:30px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 22px rgba(79,70,229,.4);
  }
  .fab:active{transform:scale(.94)}
  .fab[hidden]{display:none}

  /* Sheet / modal */
  .scrim{position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:40; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s}
  .scrim.show{opacity:1; pointer-events:auto}
  .sheet{
    width:100%; max-width:680px; background:var(--card); border-radius:20px 20px 0 0;
    padding:8px 16px calc(var(--safe-b) + 20px); transform:translateY(100%); transition:transform .26s cubic-bezier(.3,.9,.3,1);
    max-height:88vh; overflow:auto;
  }
  .scrim.show .sheet{transform:translateY(0)}
  .grab{width:40px; height:4px; background:#cbd5e1; border-radius:99px; margin:8px auto 6px}
  .sheet h2{font-size:17px; margin:6px 2px 14px}
  .opt{display:flex; align-items:center; gap:13px; padding:14px; border:1px solid var(--line); border-radius:14px; margin-bottom:10px}
  .opt:active{background:#f8fafc}
  .opt .oe{font-size:24px; width:42px; height:42px; flex:none; border-radius:11px; background:#eef2ff; display:flex; align-items:center; justify-content:center}
  .opt .ot{flex:1}
  .opt .ot b{font-size:15px; font-weight:620}
  .opt .ot p{margin:2px 0 0; font-size:12.5px; color:var(--muted)}
  .field{margin:4px 0 14px}
  .field label{display:block; font-size:13px; color:var(--muted); margin:0 2px 6px}
  .field input, .field select{width:100%; border:1px solid var(--line); border-radius:11px; padding:12px; background:#fff}
  .btn-primary{width:100%; padding:14px; border-radius:13px; background:var(--brand); color:#fff; font-weight:680; font-size:16px}
  .btn-primary:active{background:#4338ca}
  .btn-ghost{width:100%; padding:13px; border-radius:13px; background:#f1f5f9; color:var(--ink); font-weight:600; font-size:15px; margin-top:8px}
  .menu-item{display:flex; align-items:center; gap:12px; padding:15px 6px; font-size:15.5px; border-bottom:1px solid var(--line)}
  .menu-item:last-child{border-bottom:none}
  .menu-item.danger{color:var(--danger)}
  .menu-item .mi{width:24px; text-align:center; font-size:18px}

  .toast{
    position:fixed; left:50%; bottom:calc(var(--safe-b) + 96px); transform:translateX(-50%) translateY(20px);
    background:#0f172a; color:#fff; padding:10px 18px; border-radius:99px; font-size:13.5px; z-index:60;
    opacity:0; transition:.25s; pointer-events:none; max-width:90%; text-align:center;
  }
  .toast.show{opacity:.96; transform:translateX(-50%) translateY(0)}
  .hint{font-size:12px;color:var(--muted);text-align:center;margin:14px 4px 0;line-height:1.6}
</style>
</head>
<body>
<div id="app"></div>
<button class="fab" id="fab" hidden>＋</button>
<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  const KEY = 'chuxing.trips.v1';
  const uid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id'+Date.now()+Math.random().toString(16).slice(2));
  const $ = (s,r=document)=>r.querySelector(s);
  const esc = (s)=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  // ---------- Version / changelog (维护版本时在此追加最新一条) ----------
  const APP_VERSION='1.1.0';
  const CHANGELOG=[
    {v:'1.1.0', date:'2026-06-21', notes:['条目可按住右侧 ⠿ 手柄上下拖动排序','可直接拖动到其他分类，自动归入该分类','拖动时其他条目平滑滑动让位、留出空隙，落点一目了然']},
    {v:'1.0.0', date:'2026-06-21', notes:['首个版本：多份清单、出差/旅游模板、复制上次清单','勾选进度统计、自定义分类与条目','离线可用（PWA）、备份导出与导入']},
  ];

  // ---------- Storage ----------
  function load(){
    try{ const d = JSON.parse(localStorage.getItem(KEY)); return Array.isArray(d) ? d : []; }
    catch(e){ return []; }
  }
  function save(){ localStorage.setItem(KEY, JSON.stringify(state.trips)); }

  // ---------- Templates ----------
  function mkCat(name, items){ return { id:uid(), name, entries: items.map(t=>({id:uid(), text:t, done:false})) }; }
  function blankSections(){
    return [
      { type:'item', cats:[ mkCat('未分类', []) ] },
      { type:'todo', cats:[ mkCat('未分类', []) ] },
    ];
  }
  const TPL = {
    business: { emoji:'💼', name:'出差', sections:[
      { type:'item', cats:[
        mkCat('证件钱包', ['身份证','钱包/银行卡','少量现金','工牌']),
        mkCat('电子设备', ['手机','充电器','充电宝','电脑','数据线','耳机']),
        mkCat('洗漱用品', ['牙刷牙膏','洗面奶','毛巾','剃须刀']),
        mkCat('衣物', ['换洗衣物','内衣袜子','正装','睡衣']),
      ]},
      { type:'todo', cats:[
        mkCat('出发前', ['订机票/车票','订酒店','打印/保存行程','设备充满电']),
        mkCat('离家检查', ['关好门窗','断电断气','倒垃圾','锁门']),
        mkCat('工作准备', ['准备汇报材料','确认会议时间','带好名片']),
      ]},
    ]},
    travel: { emoji:'🏖️', name:'旅游', sections:[
      { type:'item', cats:[
        mkCat('证件钱包', ['身份证','钱包/银行卡','现金']),
        mkCat('电子设备', ['手机','充电器','充电宝','相机','数据线','耳机']),
        mkCat('洗漱护肤', ['牙刷牙膏','洗面奶','防晒霜','护肤品','毛巾']),
        mkCat('衣物', ['换洗衣物','内衣袜子','外套','帽子','太阳镜','拖鞋']),
        mkCat('其他', ['雨伞','常用药','零食','水杯']),
      ]},
      { type:'todo', cats:[
        mkCat('出发前', ['订票','订酒店','查天气','规划路线','设备充满电']),
        mkCat('离家检查', ['关好门窗','断电断气','倒垃圾','锁门','安排宠物/植物']),
      ]},
    ]},
  };
  const SEC_LABEL = { item:'携带物品', todo:'待办事项' };
  const SEC_EMOJI = { item:'🧳', todo:'✅' };

  // ---------- State ----------
  const state = { trips: load(), view:'home', tripId:null, editMode:false };

  function curTrip(){ return state.trips.find(t=>t.id===state.tripId); }
  function progress(t){
    let total=0, done=0;
    t.sections.forEach(s=>s.cats.forEach(c=>c.entries.forEach(e=>{ total++; if(e.done) done++; })));
    return { total, done, pct: total? Math.round(done/total*100):0 };
  }
  function touch(t){ t.updatedAt = Date.now(); }

  // ---------- Toast ----------
  let toastT;
  function toast(msg){
    const el=$('#toast'); el.textContent=msg; el.classList.add('show');
    clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1800);
  }

  // ---------- Sheet ----------
  function openSheet(html){ $('#sheet').innerHTML='<div class="grab"></div>'+html; $('#scrim').classList.add('show'); }
  function closeSheet(){ $('#scrim').classList.remove('show'); }
  $('#scrim').addEventListener('click',e=>{ if(e.target.id==='scrim') closeSheet(); });

  // ---------- Render: Home ----------
  function renderHome(){
    state.tripId=null; state.editMode=false;
    $('#fab').hidden=false;
    const trips=[...state.trips].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
    let body;
    if(!trips.length){
      body = `<div class="empty"><div class="big">🧳</div><div>还没有清单</div>
        <div style="font-size:13px;margin-top:6px">点右下角 ＋ 新建你的第一份出行清单</div></div>`;
    } else {
      body = trips.map(t=>{
        const p=progress(t);
        const d=new Date(t.updatedAt||t.createdAt);
        const ds=`${d.getMonth()+1}月${d.getDate()}日`;
        return `<div class="card"><div class="trip" data-open="${t.id}">
          <div class="emoji">${t.emoji||'🧳'}</div>
          <div class="meta">
            <div class="name">${esc(t.name)}</div>
            <div class="info">${ds} · ${p.done}/${p.total} 已完成</div>
            <div class="mini"><i style="width:${p.pct}%"></i></div>
          </div>
          <div class="ring">${p.pct}%</div>
        </div></div>`;
      }).join('');
    }
    $('#app').innerHTML = `
      <div class="topbar"><div class="topbar-row">
        <h1>外出待办管理</h1>
        <button class="icon-btn" data-act="menu" title="备份/恢复">⋯</button>
      </div><div class="sub">出差 · 旅游 物品与待办清单 · 离线可用</div></div>
      <div class="wrap">${body}
        <div class="hint">数据仅保存在本机。建议偶尔用「⋯ → 导出备份」防止 iOS 清理缓存导致丢失。</div>
      </div>`;
  }

  // ---------- Render: Detail ----------
  function renderDetail(){
    const t=curTrip(); if(!t){ go('home'); return; }
    $('#fab').hidden=true;
    const p=progress(t);
    const edit=state.editMode;

    const sections = t.sections.map((s,si)=>{
      const cats = s.cats.map(c=>{
        const cdone=c.entries.filter(e=>e.done).length;
        const head = edit
          ? `<div class="cat-head"><input class="cname" data-edit="cat" data-si="${si}" data-cid="${c.id}" value="${esc(c.name)}" />
             <button class="del" data-act="del-cat" data-si="${si}" data-cid="${c.id}">🗑</button></div>`
          : `<div class="cat-head"><span class="cname">${esc(c.name)}</span><span class="ccount">${cdone}/${c.entries.length}</span></div>`;
        const rows = c.entries.map(e=>{
          if(edit){
            return `<div class="row" data-row data-si="${si}" data-cid="${c.id}" data-eid="${e.id}">
              <input class="etxt" data-edit="entry" data-si="${si}" data-cid="${c.id}" data-eid="${e.id}" value="${esc(e.text)}" />
              <button class="del" data-act="del-entry" data-si="${si}" data-cid="${c.id}" data-eid="${e.id}">×</button>
              <span class="drag" data-drag title="拖动排序">⠿</span></div>`;
          }
          return `<div class="row ${e.done?'done':''}" data-act="toggle" data-si="${si}" data-cid="${c.id}" data-eid="${e.id}">
            <span class="check">${e.done?'✓':''}</span><span class="txt">${esc(e.text)}</span></div>`;
        }).join('') || `<div class="row" style="color:#94a3b8;font-size:13px">（暂无条目）</div>`;
        const adder = `<div class="additem">
            <input placeholder="添加${s.type==='item'?'物品':'事项'}…" data-add="entry" data-si="${si}" data-cid="${c.id}" />
            <button data-act="add-entry" data-si="${si}" data-cid="${c.id}">添加</button></div>`;
        return `<div class="cat" data-si="${si}" data-cid="${c.id}">${head}${rows}${adder}</div>`;
      }).join('');
      const addcat = edit ? `<div class="addcat"><div class="additem">
          <input placeholder="新建分类名…" data-add="cat" data-si="${si}" />
          <button data-act="add-cat" data-si="${si}">＋ 分类</button></div></div>` : '';
      return `<div class="sec-title">${SEC_EMOJI[s.type]} ${SEC_LABEL[s.type]}
          <span class="tag">${s.cats.reduce((a,c)=>a+c.entries.filter(e=>e.done).length,0)}/${s.cats.reduce((a,c)=>a+c.entries.length,0)}</span></div>
        <div class="card">${cats}</div>${addcat}`;
    }).join('');

    $('#app').innerHTML = `
      <div class="topbar">
        <div class="topbar-row">
          <button class="icon-btn" data-act="back">‹</button>
          <h1>${t.emoji||'🧳'} ${esc(t.name)}</h1>
          <button class="icon-btn" data-act="${edit?'done-edit':'edit'}">${edit?'✓':'✎'}</button>
          <button class="icon-btn" data-act="trip-menu">⋯</button>
        </div>
        <div class="sub">${p.done}/${p.total} 已完成${edit?' · 编辑模式':''}</div>
        <div class="pbar"><i style="width:${p.pct}%"></i></div>
      </div>
      <div class="wrap">${sections}
        ${edit?'<div class="hint">按住每行右侧 ⠿ 可上下拖动排序，拖到其他分类即归入该分类。</div>':'<div class="hint">点条目打勾完成。点右上 ✎ 进入编辑可增删、改名、加分类、拖动排序。</div>'}
      </div>`;
  }

  // ---------- Router ----------
  function go(view){ state.view=view; (view==='home'?renderHome:renderDetail)(); window.scrollTo(0,0); }
  function rerender(){ (state.view==='home'?renderHome:renderDetail)(); }

  // ---------- New trip flow ----------
  function newTripSheet(){
    const others = [...state.trips].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
    openSheet(`<h2>新建出行清单</h2>
      <div class="opt" data-new="business"><div class="oe">💼</div><div class="ot"><b>出差模板</b><p>证件 · 电子 · 洗漱 · 衣物 + 离家待办</p></div></div>
      <div class="opt" data-new="travel"><div class="oe">🏖️</div><div class="ot"><b>旅游模板</b><p>更全的随身物品与出行待办</p></div></div>
      <div class="opt" data-new="blank"><div class="oe">📝</div><div class="ot"><b>空白清单</b><p>从零开始自己添加</p></div></div>
      ${others.length?`<div class="opt" data-new="copy"><div class="oe">📋</div><div class="ot"><b>复制上次清单</b><p>沿用某次内容，勾选自动重置</p></div></div>`:''}
    `);
  }
  function nameSheet(title, defName, defEmoji, onOk){
    openSheet(`<h2>${title}</h2>
      <div class="field"><label>清单名称</label><input id="nm" value="${esc(defName)}" placeholder="例如：上海出差" /></div>
      <div class="field"><label>图标</label>
        <select id="em">${['🧳','💼','🏖️','✈️','🚗','🏔️','🎒','🏨','🎉','📦'].map(e=>`<option ${e===defEmoji?'selected':''}>${e}</option>`).join('')}</select></div>
      <button class="btn-primary" id="ok">创建</button>`);
    $('#nm').focus();
    $('#ok').onclick=()=>{ const n=$('#nm').value.trim()||defName; onOk(n,$('#em').value); };
  }
  function copySheet(){
    const others=[...state.trips].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
    openSheet(`<h2>复制哪一份？</h2>`+others.map(t=>{
      const p=progress(t);
      return `<div class="opt" data-copyfrom="${t.id}"><div class="oe">${t.emoji||'🧳'}</div>
        <div class="ot"><b>${esc(t.name)}</b><p>${p.total} 个条目</p></div></div>`;
    }).join(''));
  }
  function createTrip(name, emoji, sections){
    const t={ id:uid(), name, emoji, createdAt:Date.now(), updatedAt:Date.now(), sections };
    state.trips.push(t); save(); state.tripId=t.id; closeSheet(); go('detail');
  }
  function deepCopySections(secs){
    return secs.map(s=>({ type:s.type, cats:s.cats.map(c=>({ id:uid(), name:c.name,
      entries:c.entries.map(e=>({ id:uid(), text:e.text, done:false })) })) }));
  }

  // ---------- Backup ----------
  function exportData(){
    const blob=new Blob([JSON.stringify(state.trips,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const d=new Date(); const ds=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    a.href=url; a.download=`出行清单备份-${ds}.json`; document.body.appendChild(a); a.click();
    a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);
    closeSheet(); toast('已导出备份文件');
  }
  function importData(file){
    const r=new FileReader();
    r.onload=()=>{
      try{
        const data=JSON.parse(r.result);
        if(!Array.isArray(data)) throw 0;
        // merge: keep existing, add imported (new ids if clash)
        const ids=new Set(state.trips.map(t=>t.id));
        let added=0;
        data.forEach(t=>{ if(t&&t.sections){ if(ids.has(t.id)) t.id=uid(); state.trips.push(t); added++; } });
        save(); closeSheet(); rerender(); toast(`已导入 ${added} 份清单`);
      }catch(e){ toast('文件格式不对，导入失败'); }
    };
    r.readAsText(file);
  }
  function backupSheet(){
    openSheet(`<h2>备份与恢复</h2>
      <div class="menu-item" data-act="export"><span class="mi">⬇️</span>导出全部清单（.json）</div>
      <label class="menu-item"><span class="mi">⬆️</span>从备份文件导入
        <input type="file" id="imp" accept="application/json,.json" hidden></label>
      <div class="menu-item" data-act="changelog"><span class="mi">📝</span>更新日志（v${APP_VERSION}）</div>
      <div class="hint" style="text-align:left">导入会把备份里的清单追加到当前列表，不会覆盖现有清单。</div>`);
    $('#imp').onchange=e=>{ if(e.target.files[0]) importData(e.target.files[0]); };
  }
  function changelogSheet(){
    openSheet(`<h2>更新日志 · 当前 v${APP_VERSION}</h2>`+CHANGELOG.map(c=>
      `<div style="margin-bottom:15px"><b style="font-size:15px">v${c.v}</b> <span style="color:var(--muted);font-size:12.5px">${c.date}</span>
       <ul style="margin:6px 0 0;padding-left:18px;font-size:13.5px">${c.notes.map(n=>`<li style="margin:3px 0">${esc(n)}</li>`).join('')}</ul></div>`
    ).join(''));
  }
  function tripMenuSheet(){
    const t=curTrip();
    openSheet(`<h2>${esc(t.name)}</h2>
      <div class="menu-item" data-act="rename"><span class="mi">✏️</span>重命名 / 改图标</div>
      <div class="menu-item" data-act="reset"><span class="mi">🔄</span>重置所有勾选</div>
      <div class="menu-item" data-act="duplicate"><span class="mi">📋</span>复制为新清单</div>
      <div class="menu-item danger" data-act="delete"><span class="mi">🗑</span>删除此清单</div>`);
  }

  // ---------- Events: clicks ----------
  document.body.addEventListener('click', (ev)=>{
    const el = ev.target.closest('[data-act],[data-open],[data-new],[data-copyfrom]');
    if(!el) return;
    const d=el.dataset;

    if(d.open!==undefined){ state.tripId=d.open; go('detail'); return; }

    if(d.new!==undefined){
      if(d.new==='blank') nameSheet('新建空白清单','新清单','📝',(n,e)=>createTrip(n,e,blankSections()));
      else if(d.new==='copy') copySheet();
      else { const tp=TPL[d.new]; nameSheet(`新建${tp.name}清单`,tp.name,tp.emoji,(n,e)=>createTrip(n,e,deepCopySections(tp.sections))); }
      return;
    }
    if(d.copyfrom!==undefined){
      const src=state.trips.find(t=>t.id===d.copyfrom);
      nameSheet('复制为新清单',src.name+' 副本',src.emoji,(n,e)=>createTrip(n,e,deepCopySections(src.sections)));
      return;
    }

    const act=d.act;
    if(act==='menu') return backupSheet();
    if(act==='changelog') return changelogSheet();
    if(act==='export') return exportData();
    if(act==='back') return go('home');
    if(act==='edit'){ state.editMode=true; return rerender(); }
    if(act==='done-edit'){ state.editMode=false; return rerender(); }
    if(act==='trip-menu') return tripMenuSheet();

    const t=curTrip();

    if(act==='toggle'){
      const c=t.sections[d.si].cats.find(x=>x.id===d.cid);
      const e=c.entries.find(x=>x.id===d.eid);
      e.done=!e.done; touch(t); save(); rerender(); return;
    }
    if(act==='del-entry'){
      const c=t.sections[d.si].cats.find(x=>x.id===d.cid);
      c.entries=c.entries.filter(x=>x.id!==d.eid); touch(t); save(); rerender(); return;
    }
    if(act==='del-cat'){
      const s=t.sections[d.si];
      if(s.cats.length<=1){ toast('每个区块至少保留一个分类'); return; }
      s.cats=s.cats.filter(x=>x.id!==d.cid); touch(t); save(); rerender(); return;
    }
    if(act==='add-entry'){
      const inp=$(`input[data-add="entry"][data-si="${d.si}"][data-cid="${d.cid}"]`);
      const v=inp.value.trim(); if(!v) return;
      const c=t.sections[d.si].cats.find(x=>x.id===d.cid);
      c.entries.push({id:uid(),text:v,done:false}); touch(t); save(); rerender(); return;
    }
    if(act==='add-cat'){
      const inp=$(`input[data-add="cat"][data-si="${d.si}"]`);
      const v=inp.value.trim(); if(!v) return;
      t.sections[d.si].cats.push({id:uid(),name:v,entries:[]}); touch(t); save(); rerender(); return;
    }
    if(act==='rename'){
      nameSheet('重命名',t.name,t.emoji,(n,e)=>{ t.name=n; t.emoji=e; touch(t); save(); closeSheet(); rerender(); });
      return;
    }
    if(act==='reset'){
      t.sections.forEach(s=>s.cats.forEach(c=>c.entries.forEach(e=>e.done=false)));
      touch(t); save(); closeSheet(); rerender(); toast('已重置所有勾选'); return;
    }
    if(act==='duplicate'){
      nameSheet('复制为新清单',t.name+' 副本',t.emoji,(n,e)=>createTrip(n,e,deepCopySections(t.sections)));
      return;
    }
    if(act==='delete'){
      openSheet(`<h2>删除「${esc(t.name)}」？</h2><p style="color:var(--muted);font-size:14px;margin:0 2px 16px">删除后无法恢复（除非有备份）。</p>
        <button class="btn-primary" style="background:var(--danger)" data-act="delete-yes">确认删除</button>
        <button class="btn-ghost" data-act="cancel">取消</button>`);
      return;
    }
    if(act==='delete-yes'){
      state.trips=state.trips.filter(x=>x.id!==t.id); save(); closeSheet(); go('home'); toast('已删除'); return;
    }
    if(act==='cancel'){ closeSheet(); return; }
  });

  // ---------- Events: inline edits (blur/change) ----------
  document.body.addEventListener('change',(ev)=>{
    const el=ev.target; const d=el.dataset; if(!d.edit) return;
    const t=curTrip(); if(!t) return;
    if(d.edit==='cat'){
      const c=t.sections[d.si].cats.find(x=>x.id===d.cid);
      c.name=el.value.trim()||c.name; touch(t); save();
    } else if(d.edit==='entry'){
      const c=t.sections[d.si].cats.find(x=>x.id===d.cid);
      const e=c.entries.find(x=>x.id===d.eid);
      const v=el.value.trim();
      if(v){ e.text=v; } touch(t); save();
    }
  });

  // ---------- Events: Enter to add ----------
  document.body.addEventListener('keydown',(ev)=>{
    if(ev.key!=='Enter') return;
    const el=ev.target; const d=el.dataset;
    if(d.add==='entry'){ ev.preventDefault();
      const btn=$(`button[data-act="add-entry"][data-si="${d.si}"][data-cid="${d.cid}"]`); btn&&btn.click(); }
    else if(d.add==='cat'){ ev.preventDefault();
      const btn=$(`button[data-act="add-cat"][data-si="${d.si}"]`); btn&&btn.click(); }
  });

  $('#fab').addEventListener('click', newTripSheet);

  // ---------- Drag to reorder / move entries (edit mode, touch + mouse) ----------
  let drag=null, gap=null;
  function getGap(){ if(!gap){ gap=document.createElement('div'); gap.className='dropgap'; } return gap; }
  function clearGap(){ if(gap && gap.parentNode) gap.parentNode.removeChild(gap); }
  function positionClone(){ if(drag) drag.clone.style.transform=`translate(${drag.x-drag.dx}px,${drag.y-drag.dy}px)`; }

  // 拖动开始时拍一次“去掉被拖条目”的布局快照（文档坐标，全程不变），落点判断只依赖手指坐标 vs 快照 → 不受动画影响、不抖动
  function snapshotSlots(){
    const sy=window.scrollY;
    drag.slots=[...document.querySelectorAll(`.cat[data-cid][data-si="${drag.si}"]`)].map(cc=>{
      const cr=cc.getBoundingClientRect();
      const rows=[...cc.querySelectorAll('.row[data-row]')].filter(r=>!r.classList.contains('ph')).map(r=>{
        const rr=r.getBoundingClientRect(); return { eid:r.dataset.eid, mid: rr.top+rr.height/2+sy };
      });
      return { cid:cc.dataset.cid, top:cr.top+sy, bottom:cr.bottom+sy, rows };
    });
  }
  function evaluateDrop(){
    if(!drag || !drag.slots || !drag.slots.length) return;
    const py=(drag.y-drag.dy+drag.gapH/2)+window.scrollY; // 以悬浮条目的中心（而非手指点）对齐落点，空隙正好开在拖动项所在处
    let cat=null;
    for(const s of drag.slots){ if(py>=s.top && py<=s.bottom){ cat=s; break; } }
    if(!cat){ let bd=Infinity; for(const s of drag.slots){ const d=py<s.top? s.top-py : py-s.bottom; if(d<bd){ bd=d; cat=s; } } } // 越界则就近，限制在同区块内
    if(!cat) return;
    let beforeEid=null;
    for(const r of cat.rows){ if(py<r.mid){ beforeEid=r.eid; break; } }
    const key=cat.cid+':'+(beforeEid||'END');
    drag.target={ toCid:cat.cid, beforeEid };
    if(key===drag.slotKey) return;              // 落点未变：什么都不做（关键：杜绝重复动画/抖动）
    const catEl=document.querySelector(`.cat[data-cid="${cat.cid}"]`); if(!catEl) return;
    const beforeEl=beforeEid? catEl.querySelector(`.row[data-row][data-eid="${beforeEid}"]`) : catEl.querySelector('.additem');
    const animRows=[...document.querySelectorAll(`.row[data-row][data-si="${drag.si}"]`)].filter(r=>!r.classList.contains('ph'));
    const first=new Map(); animRows.forEach(r=>first.set(r, r.getBoundingClientRect().top)); // First：当前视觉位置（支持动画中途打断）
    catEl.insertBefore(getGap(), beforeEl);
    drag.slotKey=key;
    flipRows(animRows, first);
  }
  function flipRows(animRows, first){
    animRows.forEach(r=>{ r.style.transition='none'; r.style.transform='none'; });
    void document.body.offsetWidth;                                  // 重排，读到真实新布局（Last）
    animRows.forEach(r=>{ if(!first.has(r)) return; const dy=first.get(r)-r.getBoundingClientRect().top; if(Math.abs(dy)>0.5) r.style.transform=`translateY(${dy}px)`; });
    void document.body.offsetWidth;                                  // 应用反向位移（Invert）
    animRows.forEach(r=>{ r.style.transition='transform .16s cubic-bezier(.2,.7,.3,1)'; r.style.transform=''; }); // 过渡回零（Play）
  }
  function dragLoop(){
    if(!drag) return;
    const top=100, bot=window.innerHeight-120;
    if(drag.y<top) window.scrollBy(0,-Math.ceil((top-drag.y)/5));
    else if(drag.y>bot) window.scrollBy(0,Math.ceil((drag.y-bot)/5));
    evaluateDrop();
    drag.raf=requestAnimationFrame(dragLoop);
  }
  function moveEntry(t, si, fromCid, eid, toCid, beforeEid){
    const sec=t.sections[si];
    const from=sec.cats.find(c=>c.id===fromCid);
    const idx=from.entries.findIndex(e=>e.id===eid); if(idx<0) return;
    const [moved]=from.entries.splice(idx,1);
    const to=sec.cats.find(c=>c.id===toCid);
    let at;
    if(beforeEid==null){ at=to.entries.length; }
    else { at=to.entries.findIndex(e=>e.id===beforeEid); if(at<0) at=to.entries.length; }
    to.entries.splice(at,0,moved);
  }
  function endDrag(commit){
    if(!drag) return;
    const d=drag; drag=null;
    cancelAnimationFrame(d.raf);
    document.body.style.userSelect='';
    if(d.clone.parentNode) d.clone.parentNode.removeChild(d.clone);
    clearGap();
    if(commit && d.target){
      const t=curTrip();
      if(t){ moveEntry(t, +d.si, d.fromCid, d.eid, d.target.toCid, d.target.beforeEid); touch(t); save(); }
    }
    rerender();
  }
  document.body.addEventListener('pointerdown',(ev)=>{
    const h=ev.target.closest('.drag[data-drag]');
    if(!h || !state.editMode || drag) return;
    const row=h.closest('.row[data-row]'); if(!row) return;
    ev.preventDefault();
    const rect=row.getBoundingClientRect();
    const clone=row.cloneNode(true); clone.classList.add('dragclone');
    clone.removeAttribute('data-row'); clone.removeAttribute('data-si'); // 防止浮动副本被行选择器/FLIP 误伤导致跳动
    clone.style.width=rect.width+'px';
    document.body.appendChild(clone);
    getGap().style.height=rect.height+'px';
    drag={ si:row.dataset.si, fromCid:row.dataset.cid, eid:row.dataset.eid, clone, srcRow:row, gapH:rect.height,
      dx:ev.clientX-rect.left, dy:ev.clientY-rect.top, x:ev.clientX, y:ev.clientY, target:null, slotKey:null, slots:[], raf:0 };
    row.classList.add('ph');                 // 隐藏源行（不占布局）
    snapshotSlots();                          // 在插入占位条之前、以去掉源行的布局拍快照
    const nb=row.nextElementSibling;          // 拿起即在原位留空，避免列表跳动
    row.parentNode.insertBefore(getGap(), nb);
    const nbEid=(nb&&nb.matches&&nb.matches('.row[data-row]'))?nb.dataset.eid:null;
    drag.slotKey=row.dataset.cid+':'+(nbEid||'END');
    drag.target={ toCid:row.dataset.cid, beforeEid:nbEid };
    positionClone();
    try{ h.setPointerCapture(ev.pointerId); }catch(_){}
    document.body.style.userSelect='none';
    drag.raf=requestAnimationFrame(dragLoop);
  },{passive:false});
  document.body.addEventListener('pointermove',(ev)=>{
    if(!drag) return;
    ev.preventDefault();
    drag.x=ev.clientX; drag.y=ev.clientY;
    positionClone(); evaluateDrop();
  },{passive:false});
  document.body.addEventListener('pointerup',(ev)=>{ if(drag){ ev.preventDefault(); endDrag(true); } },{passive:false});
  document.body.addEventListener('pointercancel',()=>{ if(drag) endDrag(false); });

  // ---------- Boot ----------
  renderHome();

  // Register service worker (offline). Ignored if opened via file://.
  if('serviceWorker' in navigator && location.protocol.startsWith('http')){
    window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
  }
})();
</script>
</body>
</html>
